name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy to Dev VPS
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: .
          sparse-checkout-cone-mode: false

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'dev',
              auto_merge: false,
              required_contexts: [],
              description: `Deploy ${context.sha.substring(0, 7)} to dev`,
            });
            return deployment.data.id;

      - name: Set deployment in-progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'in_progress',
              description: 'Deployment started',
            });

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_DEV_SSH_KEY }}

      - name: Pin known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_DEV_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEPLOY_DEV_USER }}@${{ secrets.DEPLOY_DEV_HOST }} \
            'sudo /home/cinemata/cinematacms/restart_script.sh'

      - name: Set deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              description: 'Deployment completed successfully',
            });

      - name: Set deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure',
              description: 'Deployment failed',
            });

      - name: Notify Telegram on success
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        continue-on-error: true
        run: |
          curl -sfS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"parse_mode\": \"HTML\",
              \"text\": \"✅ <b>Dev deploy succeeded</b>\nCommit: <code>${GITHUB_SHA::7}</code>\nAuthor: ${{ github.actor }}\nRun: <a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">View workflow</a>\"
            }"

      - name: Notify Telegram on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        continue-on-error: true
        run: |
          curl -sfS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"parse_mode\": \"HTML\",
              \"text\": \"❌ <b>Dev deploy failed</b>\nCommit: <code>${GITHUB_SHA::7}</code>\nAuthor: ${{ github.actor }}\nRun: <a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">View workflow</a>\"
            }"
