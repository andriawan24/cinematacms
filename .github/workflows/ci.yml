name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/packages/vjs-plugin-font-icons/package-lock.json
            frontend/packages/vjs-plugin/package-lock.json
            frontend/packages/media-player/package-lock.json

      # Install frontend deps first: this populates frontend/node_modules
      # (including `autoprefixer`, required by frontend/postcss.config.js which
      # the workspace packages' vite builds pick up via upward config search)
      # and installs the three workspace packages as symlinks back into
      # frontend/packages/*, so their dist/ becomes visible to the final
      # frontend build once they're built below.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-fund --no-audit

      - name: Build workspace package — vjs-plugin-font-icons
        working-directory: frontend/packages/vjs-plugin-font-icons
        run: |
          npm ci --no-fund --no-audit
          npm run build

      - name: Build workspace package — vjs-plugin
        working-directory: frontend/packages/vjs-plugin
        run: |
          npm ci --no-fund --no-audit
          npm run build

      - name: Build workspace package — media-player
        working-directory: frontend/packages/media-player
        run: |
          npm ci --no-fund --no-audit
          npm run build

      - name: Lint frontend (modern track)
        working-directory: frontend
        run: npm run lint:modern

      - name: Lint frontend (legacy track)
        working-directory: frontend
        run: npm run lint:legacy

      - name: Test frontend
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-migrations:
    name: Backend — Migrations Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick libmagic1

      - name: Install Python dependencies
        run: uv sync --all-extras

      # cms/settings.py ends with `from .local_settings import *`, and
      # cms/local_settings.py is gitignored. Copy the committed example so
      # settings.py imports cleanly in CI; SECRET_KEY comes from env below.
      - name: Materialize CI local_settings
        run: cp cms/local_settings_example.py cms/local_settings.py

      # LOGGING in cms/settings.py uses a FileHandler at logs/debug.log;
      # the directory is gitignored, so a fresh checkout has no logs/ and
      # django.setup() raises before makemigrations runs.
      - name: Create logs directory for Django FileHandler
        run: mkdir -p logs

      - name: Check for missing migrations
        env:
          SECRET_KEY: ci-not-a-real-secret-key-do-not-use-in-prod
        run: uv run python manage.py makemigrations --check

  pre-commit:
    name: Pre-commit (lint & format)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python 3.10
        run: uv python install 3.10

      - name: Setup Node.js (for Prettier hook)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run pre-commit (make lint)
        run: make lint

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: mediacms
          POSTGRES_PASSWORD: mediacms
          POSTGRES_DB: mediacms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: cms.ci_settings
      SECRET_KEY: ci-test-key-not-for-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick libmagic1

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run migrations
        run: uv run python manage.py migrate --noinput

      - name: Run tests
        run: uv run python manage.py test --noinput --verbosity=2 --exclude-tag=requires-whisper

  deploy-dev:
    name: Deploy to Dev VPS
    needs:
      - frontend-build
      - backend-migrations
      - pre-commit
      - backend-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    env:
      DEPLOY_SHA: ${{ github.sha }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.DEPLOY_SHA,
              environment: 'dev',
              auto_merge: false,
              required_contexts: [],
              description: `Deploy ${process.env.DEPLOY_SHA.substring(0, 7)} to dev`,
            });
            return deployment.data.id;

      - name: Set deployment in-progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'in_progress',
              description: 'Deployment started',
            });

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_DEV_SSH_KEY }}

      - name: Pin known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_DEV_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEPLOY_DEV_USER }}@${{ secrets.DEPLOY_DEV_HOST }} \
            'sudo /home/cinemata/cinematacms/restart_script.sh'

      - name: Set deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              description: 'Deployment completed successfully',
            });

      - name: Set deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure',
              description: 'Deployment failed',
            });

      - name: Notify Telegram on success
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        continue-on-error: true
        run: |
          curl -sfS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"parse_mode\": \"HTML\",
              \"text\": \"✅ <b>Dev deploy succeeded</b>\nCommit: <code>${DEPLOY_SHA::7}</code>\nAuthor: ${{ github.actor }}\nRun: <a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">View workflow</a>\"
            }"

      - name: Notify Telegram on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        continue-on-error: true
        run: |
          curl -sfS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"parse_mode\": \"HTML\",
              \"text\": \"❌ <b>Dev deploy failed</b>\nCommit: <code>${DEPLOY_SHA::7}</code>\nAuthor: ${{ github.actor }}\nRun: <a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">View workflow</a>\"
            }"
